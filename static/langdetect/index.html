<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Detection - CLD2 / FastText / CLD3</title>
<link rel="shortcut icon" type="image/png" href="/favicon.png"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 1.6em; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9em; }
  textarea { width: 100%; max-width: 720px; height: 120px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 14px; color: #e0e0e0; font-size: 15px; resize: vertical; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: #4a9eff; }
  textarea::placeholder { color: #555; }
  .results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 100%; max-width: 720px; margin-top: 20px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
  .card-title { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .card-title .time { font-size: 0.9em; color: #555; text-transform: none; letter-spacing: 0; }
  .lang-primary { font-size: 1.8em; font-weight: 700; color: #fff; }
  .lang-primary.und { color: #555; }
  .confidence { font-size: 0.85em; color: #4a9eff; margin-top: 2px; }
  .bar { height: 4px; background: #2a2a2a; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
  .bar-fill.cld2 { background: #e67e22; }
  .bar-fill.ft { background: #4a9eff; }
  .bar-fill.cld3 { background: #2ecc71; }
  .secondary { margin-top: 10px; font-size: 0.8em; color: #666; }
  .secondary span { color: #888; }
  .status { margin-top: 16px; font-size: 0.8em; color: #555; max-width: 720px; }
  @media (max-width: 600px) { .results { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Language Detection</h1>
<p class="subtitle">CLD2, FastText, and CLD3 running in WebAssembly</p>

<textarea id="input" placeholder="Type or paste text in any language..."></textarea>

<div class="results">
  <div class="card" id="card-cld2">
    <div class="card-title">CLD2 <span class="time" id="time-cld2"></span></div>
    <div class="lang-primary und" id="lang-cld2">---</div>
    <div class="confidence" id="conf-cld2"></div>
    <div class="bar"><div class="bar-fill cld2" id="bar-cld2" style="width:0%"></div></div>
    <div class="secondary" id="sec-cld2"></div>
  </div>
  <div class="card" id="card-ft">
    <div class="card-title">FastText <span class="time" id="time-ft"></span></div>
    <div class="lang-primary und" id="lang-ft">---</div>
    <div class="confidence" id="conf-ft"></div>
    <div class="bar"><div class="bar-fill ft" id="bar-ft" style="width:0%"></div></div>
    <div class="secondary" id="sec-ft"></div>
  </div>
  <div class="card" id="card-cld3">
    <div class="card-title">CLD3 <span class="time" id="time-cld3"></span></div>
    <div class="lang-primary und" id="lang-cld3">---</div>
    <div class="confidence" id="conf-cld3"></div>
    <div class="bar"><div class="bar-fill cld3" id="bar-cld3" style="width:0%"></div></div>
    <div class="secondary" id="sec-cld3"></div>
  </div>
</div>

<div class="status" id="status">Loading WASM module...</div>

<script src="langdetect.js"></script>
<script>
var Module = null;
var detectFT, detectCLD3, detectCLD2;

LangDetect().then(function(m) {
  Module = m;
  detectFT = Module.cwrap('detect_fasttext', 'string', ['string', 'number']);
  detectCLD3 = Module.cwrap('detect_cld3', 'string', ['string', 'number']);
  detectCLD2 = Module.cwrap('detect_cld2', 'string', ['string', 'number']);
  document.getElementById('status').textContent = 'Ready. Type to detect language.';
  document.getElementById('input').focus();
});

var debounceTimer = null;
document.getElementById('input').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(runDetection, 150);
});

function runDetection() {
  if (!Module) return;
  var text = document.getElementById('input').value;
  if (!text.trim()) { clearResults(); return; }
  var len = new TextEncoder().encode(text).length;

  var t0 = performance.now();
  var r = JSON.parse(detectCLD2(text, len));
  showResult('cld2', r, performance.now() - t0);

  t0 = performance.now();
  r = JSON.parse(detectFT(text, len));
  showResult('ft', r, performance.now() - t0);

  t0 = performance.now();
  r = JSON.parse(detectCLD3(text, len));
  showResult('cld3', r, performance.now() - t0);

  document.getElementById('status').textContent = len + ' bytes analyzed';
}

function showResult(id, r, ms) {
  var lang = r.lang || 'und';
  var prob = r.prob || 0;
  var pct = Math.round(prob * 100);

  var el = document.getElementById('lang-' + id);
  el.textContent = lang.toUpperCase();
  el.className = 'lang-primary' + (lang === 'und' ? ' und' : '');

  document.getElementById('conf-' + id).textContent = pct > 0 ? pct + '%' : '';
  document.getElementById('bar-' + id).style.width = pct + '%';
  document.getElementById('time-' + id).textContent = ms.toFixed(1) + 'ms';

  var sec = '';
  if (r.lang2 && r.prob2 > 0.01) sec += '<span>' + r.lang2 + '</span> ' + Math.round(r.prob2*100) + '%';
  if (r.lang3 && r.prob3 > 0.01) sec += '  <span>' + r.lang3 + '</span> ' + Math.round(r.prob3*100) + '%';
  document.getElementById('sec-' + id).innerHTML = sec;
}

function clearResults() {
  ['cld2', 'ft', 'cld3'].forEach(function(id) {
    document.getElementById('lang-' + id).textContent = '---';
    document.getElementById('lang-' + id).className = 'lang-primary und';
    document.getElementById('conf-' + id).textContent = '';
    document.getElementById('bar-' + id).style.width = '0%';
    document.getElementById('time-' + id).textContent = '';
    document.getElementById('sec-' + id).innerHTML = '';
  });
  document.getElementById('status').textContent = 'Ready. Type to detect language.';
}
</script>
</body>
</html>
